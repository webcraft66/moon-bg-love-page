<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Romantic Love Page 💕✨</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="fireworks-canvas"></canvas>
    <div id="stars-container"></div>
    <div id="moon"></div>
<div class="container">
    <input type="text" id="partner1" placeholder="Your name 💕" maxlength="15" style="margin-bottom: 10px; padding: 10px; border-radius: 20px; border: none; font-size: 1em;">
    <input type="text" id="partner2" placeholder="Partner's name 💖" maxlength="15" style="margin-bottom: 20px; padding: 10px; border-radius: 20px; border: none; font-size: 1em;">
    <button id="personalize-btn">Personalize Love 💕</button><br><br>
        <h1 class="title">I Love You! 💕💖✨</h1>
        <p class="message">Click anywhere for fireworks of love! 💥💕 <span id="love-note"></span></p>
        <div class="heart" id="main-heart">💖</div>
        <div id="hearts-container"></div>
        <button id="new-message">New Love Message 💕</button>
        <button id="proposal-btn">Will You Marry Me? 💍✨</button>
<p style="font-size: 1em; margin-top: 20px; opacity: 0.8;">💕 Click stars/moon/heart for magic messages & fireworks! 💕</p>
    </div>

    <!-- Couple Silhouette -->
    <div id="couple-silhouette">
        <div class="silhouette-figure left"></div>
        <div class="silhouette-figure right"></div>
        <div class="hearts-link"></div>
    </div>

    <!-- Background Music -->
    <audio id="bgm" loop>
        <source src="https://www.soundjay.com/misc/sounds/romantic-piano-1.mp3" type="audio/mpeg"> <!-- Fallback: free CDN example; replace if needed -->
    </audio>
    <script src="script.js"></script>
</body>
</html>
